<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>プラスチック山田 — プロフィール</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="description" content="プラスチック山田のプロフィールサイト（サイバーチック）">
</head>
<body>
  <div class="bg-grid"></div>
  <header class="site-header">
    <h1 class="neon">プラスチック山田</h1>
    <p class="subtitle">宝くじを当てるサイヤ人のプロフィール</p>
  </header>

  <main class="container">
    <section id="profile" class="card">
      <h2>プロフィール</h2>
      <div class="monitor">
        <div class="screen">
          <div class="scan"></div>
        </div>
        <svg class="circuits" viewBox="0 0 600 200" preserveAspectRatio="none" aria-hidden>
          <g stroke="url(#g)" stroke-width="2" fill="none">
            <path d="M10 160 H80 M80 160 V40 H200"/>
            <path d="M150 160 H240 M240 160 V80 H360"/>
            <path d="M320 160 H420 M420 160 V20 H560"/>
          </g>
          <defs>
            <linearGradient id="g" x1="0" x2="1">
              <stop offset="0%" stop-color="#5ef3ff" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="#00bfff" stop-opacity="0.6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <p>
        プラスチック山田<br>
        横浜の横断歩道で転び右橈骨遠位端骨折治療中（スミス）<br>
        好きな食べ物はアップルパイだが、お気に入りの店は潰れた<br>
        現在不労所得中（残り2日）
        将来の夢はFIRE
      </p>
      <p class="motto">北斗神拳に２対１の戦いは無い<br>退かぬ！媚びぬ！省みぬ！！</p>
    </section>

    <section id="skills" class="card">
      <h2>特技</h2>
      <ul>
        <li>五接地転回法</li>
      </ul>
      <p>（その他：デジタル造形、ライトアップ、3Dモデリング）</p>
    </section>

    <section id="oshi" class="card">
      <h2>推し</h2>
      <ul>
        <li>エルキドゥ</li>
        <li>陸奥（誰とか言ったやつは夜道に気をつけろ）</li>
        <li>時透有一郎（物語開始時点故人）</li>
        <li>錆兎（物語開始時点故人）</li>
      </ul>
    </section>
  </main>

  <footer class="footer">
    <small>© プラスチック山田</small>
  </footer>

</body>
</html>
